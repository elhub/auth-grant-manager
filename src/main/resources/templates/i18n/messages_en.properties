change_of_supplier.document_title=Confirm electricity supply agreement - Change of supplier
change_of_supplier.intro_1=The Norwegian Regulatory Authority (RME) has instructed Elhub to verify that there is a valid electricity supply agreement in place prior to move-in and change of electricity supplier (supplier change).
change_of_supplier.bullet_1=In order to complete the supplier change, the electricity supply agreement must be confirmed within four weeks.
change_of_supplier.bullet_2=If you reject the request or do not confirm the electricity supply agreement, the supplier change will not be completed.
change_of_supplier.bullet_3=Once the supplier change process has been completed, the confirmation cannot be reused by the electricity supplier.

move_in.document_title=Confirm electricity supply agreement - Move-in and change of supplier
move_in.intro_1=The Norwegian Regulatory Authority (RME) has instructed Elhub to verify that there is a valid electricity supply agreement in place prior to move-in and change of electricity supplier (supplier change).
move_in.bullet_1=In order to complete the move-in and supplier change, the electricity supply agreement must be confirmed within four weeks.
move_in.bullet_2=If you reject the request or do not confirm the electricity supply agreement, the move-in and supplier change will not be completed.
move_in.bullet_3=Once the move-in and supplier change process has been completed, the confirmation cannot be reused by the electricity supplier.

common.intro_signing_confirmation=By signing this document, you confirm that you have accepted the electricity supply agreement referenced above.
common.bullet_elhub_minside=This document will be available to electricity customers on the Elhub My Page.
common.more_information=More information about confirming an electricity supply agreement is available on the Elhub website.
