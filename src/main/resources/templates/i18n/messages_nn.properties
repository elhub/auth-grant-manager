change_of_supplier.intro_1=Reguleringsmyndigheita for Energi (RME) har pålagd Elhub å kontrollere at det ligg føre gyldig straumavtale før innflytting og skifte av straumleverandør (leverandørskifte).
change_of_supplier.bullet_1=For å få gjennomført leverandørskifte må straumavtalen stadfestast innan 4 veker.
change_of_supplier.bullet_2=Om du avslår førespurnaden eller ikkje stadfestar straumavtalen blir leverandørskifte ikkje gjennomført.
