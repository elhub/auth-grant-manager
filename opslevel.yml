    - name: GitHub Actions
      category: continuous_integration
      url: https://github.com/elhub/auth-grant-manager/actions
      environment: Production
    - name: OpenAPI Spec
      category: api_documentation
      url: https://github.com/elhub/auth-grant-manager/blob/main/src/main/resources/static/openapi.yaml
      environment: Production
    - name: Architecture Docs
      category: wiki
      url: https://github.com/elhub/auth-grant-manager/blob/main/docs/architecture.md
      environment: Production
    - name: Usage Docs
      category: wiki
      url: https://github.com/elhub/auth-grant-manager/blob/main/docs/usage.md
      environment: Production
  dependencies:
